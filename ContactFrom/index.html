<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="container container--flex-column">

            <img class="header__logo" src="./images/logotipo.svg" alt="">

            <h1 class="header__title">Contact Form</h1>

            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>

        </div>
    </header>
    <main>

        <!--Nome-->
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome"
                            placeholder="Nome" type="text">

                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome"
                            placeholder="Sobrenome" type="text">
                    </div>
                </div>
                <!--Nome-->


                <!--Email-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Email">Email</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--inteiro" name="Email" id="Email"
                            placeholder="ex:fulano@email.com" type="text">
                    </div>
                </div>
                <!--Email-->


                <!--!telefone-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="telefone">Telefone</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="+55" id="pais"
                            placeholder="+55" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="ddd" id="ddd"
                            placeholder="ddd" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="ex:99999-9999"
                            id="telefone" placeholder="ex:99999-9999" type="text">
                    </div>
                </div>
                <!--!telefone-->


                <!--Endereco-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço">Endereço</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--quarto" name="cep:" id="cep"
                            placeholder="cep" type="text">

                        <input class="contact-form__input contact-form__input--metade" name="Rua la de casa"
                            id="Endereco" placeholder="Rua la de casa" type="text">

                        <input class="contact-form__input contact-form__input--quarto" name="ex:555" id="numero"
                            placeholder="ex:555" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="Apto X bloco X"
                            id="Apto" placeholder="Apto X bloco X" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="Bairro" id="Bairro"
                            placeholder="Bairro" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="Cidade" id="Cidade"
                            placeholder="Cidade " type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="Estado" id="Estado"
                            placeholder="Estado" type="text">
                    </div>
                </div>
                <!--Endereco-->


                <!--Anotacoes-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="anotacoes">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                        <textarea class="contact-form__input contact-form__input--inteiro contact-form__textarea"
                            name="anotacoes" id="anotacoes" placeholder="Suas anotações aqui"></textarea>
                    </div>
                </div>
                <!--Anotacoes-->

                <!--Botoes-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                    </div>

                    <div class="contact-form__col-b">
                        <button
                        type="button" 
                        id="Cadastrar" 
                        name="Cadastrar"
                        class="contact-form__button contact-form__input--metade" 
                        onclick="minhaFuncao();">Cadastrar
                        </button>

                        <button
                         type="reset" 
                         id="Limpar"
                         name="Limpar"
                         class="contact-form__button contact-form__input--metade">Limpar
                        </button>
                    </div>
                </div>
                <!--Botoes-->

            </form>
        </div>
    </main>
    <script>
        function minhaFuncao() {
            let nome = document.getElementById("nome").value.trim();
            let sobrenome = document.getElementById("sobrenome").value.trim();
            let Email = document.getElementById("Email").value.trim();
            let pais = document.getElementById("Email").value.trim();
            let ddd = document.getElementById("Email").value.trim();
            let telefone = document.getElementById("Email").value.trim();
            let cep = document.getElementById("Email").value.trim();
            let Endereco = document.getElementById("Email").value.trim();
            let numero = document.getElementById("Email").value.trim();
            let Apto = document.getElementById("Email").value.trim();
            let Cidade = document.getElementById("Email").value.trim();
            let Bairro = document.getElementById("Email").value.trim();
            let Estado = document.getElementById("Email").value.trim();
            let anotacoes = document.getElementById("Email").value.trim();

            alert(nome.length);

            if (nome.length == 0 ) {
               formError("nome");
            } else {
                reiniciaBordo("nome")
            }
            
            if (sobrenome.length == 0 ) {
               formError("sobrenome");
            } else {
                reiniciaBordo("sobrenome")
            }

            if (Email.length == 0 ) {
               formError("Email");
            } else {
                reiniciaBordo("Email")
            }

            if (pais.length == 0 ) {
               formError("pais");
            } else {
                reiniciaBordo("pais")
            }

            if (ddd.length == 0 ) {
               formError("ddd");
            } else {
                reiniciaBordo("ddd")
            }

            if (telefone.length == 0 ) {
               formError("telefone");
            } else {
                reiniciaBordo("telefone")
            }

            if (cep.length == 0 ) {
               formError("cep");
            } else {
                reiniciaBordo("cep")
            }

            if (Endereco.length == 0 ) {
               formError("Endereco");
            } else {
                reiniciaBordo("Endereco")
            }
            if (numero.length == 0 ) {
               formError("numero");
            } else {
                reiniciaBordo("numero")
            }

            if (Apto.length == 0 ) {
               formError("Apto");
            } else {
                reiniciaBordo("Apto")
            }

            if (Cidade.length == 0 ) {
               formError("Cidade");
            } else {
                reiniciaBordo("Cidade")
            }

            if (Bairro.length == 0 ) {
               formError("Bairro");
            } else {
                reiniciaBordo("Bairro")
            }

            if (Estado.length == 0 ) {
               formError("Estado");
            } else {
                reiniciaBordo("Estado")
            }

            if (anotacoes.length == 0 ) {
               formError("anotacoes");
            } else {
                reiniciaBordo("anotacoes")
            }

           // fim da funcao//
        }

            function formError(fildId){
                document.getElementById(fildId).style.border = "1px solid red"
            }

            function reiniciaBordo(fildId){
                document.getElementById(fildId).style.border = "none"
            }

    </script>
</body>

</html>
