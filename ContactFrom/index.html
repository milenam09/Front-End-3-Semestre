<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="container container--flex-column">

            <img class="header__logo" src="./images/logotipo.svg" alt="">

            <h1 class="header__title">Contact Form</h1>

            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>

        </div>
    </header>
    <main>

         <!--Nome-->
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input 
                        class="contact-form__input contact-form__input--metade" 
                        name="nome" 
                        id="nome"
                        placeholder="Nome" type="text">

                        <input 
                        class="contact-form__input contact-form__input--metade"
                         name="sobrenome" 
                         id="sobrenome"
                        placeholder="Sobrenome" type="text">
                    </div>
                </div>
             <!--Nome-->
    

             <!--Email-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="E-mail">E-mail</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input 
                        class="contact-form__input contact-form__input--inteiro"
                         name="E-mail" 
                         id="E-mail"
                         placeholder="ex:fulano@email.com" type="text">
                    </div>
                </div>
            <!--Email-->
                

            <!--!telefone-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="telefone">Telefone</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input 
                        class="contact-form__input contact-form__input--terco" 
                        name="+55" 
                        id="+55"
                        placeholder="+55" type="text">

                        <input 
                        class="contact-form__input contact-form__input--terco"
                         name="ddd" 
                         id="ddd"
                        placeholder="ddd" type="text">

                        <input 
                        class="contact-form__input contact-form__input--terco"
                         name="ex:99999-9999" 
                         id="ex:99999-9999"
                        placeholder="ex:99999-9999" type="text">
                    </div>
                </div>
            <!--!telefone-->


             <!--Endereco-->
                 <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço">Endereço</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input 
                        class="contact-form__input contact-form__input--quarto" 
                        name="cep:" 
                        id="cep"
                        placeholder="cep" type="text">

                        <input 
                        class="contact-form__input contact-form__input--metade"
                         name="Rua la de casa" 
                         id="Rua la de casa"
                        placeholder="Rua la de casa" type="text">

                        <input 
                        class="contact-form__input contact-form__input--quarto"
                         name="ex:555" 
                         id="ex:555"
                        placeholder="ex:555" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input 
                        class="contact-form__input contact-form__input--terco" 
                        name="Apto X bloco X" 
                        id="Apto X bloco X"
                        placeholder="Apto X bloco X" type="text">

                        <input 
                        class="contact-form__input contact-form__input--terco"
                         name="Bairro" 
                         id="Bairro"
                        placeholder="Bairro" type="text">

                        <input 
                        class="contact-form__input contact-form__input--terco"
                         name="Cidade" 
                         id="Cidade"
                        placeholder="Cidade " type="text">
                         </div>
                     </div>

                       <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input 
                        class="contact-form__input contact-form__input--terco" 
                        name="Estado" 
                        id="Estado"
                        placeholder="Estado" type="text">
                         </div>
                     </div>
                <!--Endereco-->
                    
                
                <!--Anotacoes-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="anotacoes">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                       <textarea 
                        class="contact-form__input contact-form__input--inteiro contact-form__textarea" 
                        name="anotacoes" 
                        id="anotacoes"
                        placeholder="Suas anotações aqui"></textarea>
                    </div>
                </div>
                 <!--Anotacoes-->

                <!--Botoes-->
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                    </div>

                    <div class="contact-form__col-b">
                    <button 
                      type="button"
                      id="Cadastrar"
                      name="Cadastrar"
                      class="contact-form__button contact-form__input--metade"
                      >Cadastrar 
                    </button>

                      <button 
                      type="reset"
                      id="Limpar"
                      name="Limpar"
                      class="contact-form__button contact-form__input--metade"
                      >Limpar 
                      </button>
                    </div>
                </div>
                 <!--Botoes-->


                         
            </form>
        </div>
    </main>
</body>

</html>
